{{- if eq .chezmoi.os "linux" -}}

{{- $tarballUrl := (gitHubLatestRelease "junegunn/fzf").TarballURL | quote -}}

[".local/bin/fzf"]
type = "archive-file"
url = {{ gitHubLatestReleaseAssetURL "junegunn/fzf" (printf "*-linux_%s.tar.gz" .chezmoi.arch) | quote }}
executable = true
path = "fzf"

[".local/bin/fzf-tmux"]
type = "archive-file"
url = {{ $tarballUrl }}
executable = true
stripComponents = 1
path = "bin/fzf-tmux"

[".local/share/man/man1"]
type = "archive"
url = {{ $tarballUrl }}
stripComponents = 3
include = ["*/man/man1/*.1"]

{{- end -}}
