{{- if eq .chezmoi.os "linux" -}}

{{- $tarballUrl := (gitHubLatestRelease "junegunn/fzf").TarballURL | quote -}}

[".local/bin/fzf"]
type = "archive-file"
url = {{ gitHubLatestReleaseAssetURL "junegunn/fzf" (printf "*-linux_%s.tar.gz" .chezmoi.arch) | quote }}
executable = true
path = "fzf"

[".local/bin/fzf-tmux"]
type = "archive-file"
url = {{ $tarballUrl }}
executable = true
stripComponents = 1
path = "bin/fzf-tmux"

[".local/share/man/man1/fzf.1"]
type = "archive-file"
url = {{ $tarballUrl }}
stripComponents = 1
path = "man/man1/fzf.1"

[".local/share/man/man1/fzf-tmux.1"]
type = "archive-file"
url = {{ $tarballUrl }}
stripComponents = 1
path = "man/man1/fzf-tmux.1"

{{- end -}}
