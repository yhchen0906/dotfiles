{{- if eq .chezmoi.os "linux" -}}

[".local/bin/jq"]
type = "file"
url = "https://github.com/jqlang/jq/releases/latest/download/jq-linux-{{ .chezmoi.arch }}"
executable = true

[".local/share/man/man1/jq.1"]
type = "file"
url = {{ gitHubLatestReleaseAssetURL "jqlang/jq" "jq-*.tar.gz" | quote }}
filter.command = "tar"
filter.args = ["zxO", '{{ (gitHubLatestRelease "jqlang/jq").TagName }}/jq.1']

{{- end -}}
