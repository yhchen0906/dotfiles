set -g history-limit 1000000

# https://superuser.com/a/1809494
set -g escape-time 50

# Copy and paste
set -g mouse on

# https://github.com/tmux/tmux/wiki/FAQ#how-do-i-use-rgb-colour
set -ga terminal-features ",*:RGB"

# Enable OSC8 hyperlinks
set -ga terminal-features ",*:hyperlinks"

# Window numbers start at 1 instead of 0 to make switching easier
set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on

# Allow customizing window names using bash precmd_functions
set -g allow-rename on

set -g window-size latest
set -g aggressive-resize on

# Dracula theme
set -g @white "#f8f8f2"
set -g @gray "#44475a"
set -g @dark_gray "#282a36"
set -g @light_purple "#bd93f9"
set -g @dark_purple "#6272a4"
set -g @cyan "#8be9fd"
set -g @green "#50fa7b"
set -g @orange "#ffb86c"
set -g @red "#ff5555"
set -g @purple "#b166cc"
set -g @pink "#ff79c6"
set -g @yellow "#f1fa8c"

set -g message-style "bg=#{@gray},fg=#{@white}"
set -g pane-active-border-style "fg=#{@light_purple}"
set -g pane-border-style "fg=#{@gray}"
set -g status-left "#[bg=#{@green}]#[fg=#{@dark_gray}]#{?client_prefix,#[bg=#{@yellow}],} #S "
set -g status-right ""
set -g status-style "bg=#{@gray},fg=#{@white}"
set -g window-status-separator ""
set -g window-status-activity-style "bold"
set -g window-status-bell-style "bold"
set -g window-status-current-format "#[fg=#{@white}]#[bg=#{@dark_purple}] #I #W "
set -g window-status-format "#[fg=#{@white}]#[bg=#{@gray}] #I #W "
